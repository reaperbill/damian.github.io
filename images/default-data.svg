  <rect x="219" y="84" width="80" height="18" rx="3" fill="#f1f5f9"/>
  <rect x="406" y="84" width="85" height="18" rx="3" fill="#f1f5f9"/>
  <rect x="593" y="84" width="95" height="18" rx="3" fill="#f1f5f9"/>
  <!-- KPI trend indicators -->
  <rect x="32"  y="110" width="40" height="8" rx="2" fill="#10b981"/>
  <rect x="219" y="110" width="35" height="8" rx="2" fill="#10b981"/>
  <rect x="406" y="110" width="38" height="8" rx="2" fill="#f59e0b"/>
  <rect x="593" y="110" width="42" height="8" rx="2" fill="#ef4444"/>

