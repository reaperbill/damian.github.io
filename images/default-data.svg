  <line x1="60" y1="295" x2="375" y2="295" stroke="#334155" stroke-width="1"/>
  <line x1="60" y1="272" x2="375" y2="272" stroke="#334155" stroke-width="1"/>
  <line x1="60" y1="249" x2="375" y2="249" stroke="#334155" stroke-width="1"/>
  <line x1="60" y1="226" x2="375" y2="226" stroke="#334155" stroke-width="1"/>
