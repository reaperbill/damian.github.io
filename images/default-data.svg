<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Dashboard background -->
  <rect width="800" height="400" fill="#0f172a"/>

  <!-- Top navbar -->
  <rect width="800" height="44" fill="#1e293b"/>
  <!-- Logo -->
  <rect x="20" y="13" width="28" height="18" rx="4" fill="#3b82f6"/>
  <rect x="56" y="17" width="80" height="10" rx="3" fill="#94a3b8"/>
  <!-- Nav items -->
  <rect x="260" y="17" width="50" height="10" rx="3" fill="#64748b"/>
  <rect x="326" y="17" width="60" height="10" rx="3" fill="#3b82f6"/>
  <rect x="402" y="17" width="55" height="10" rx="3" fill="#64748b"/>
  <!-- Right side -->
  <circle cx="740" cy="22" r="12" fill="#334155"/>
  <rect x="756" y="17" width="24" height="10" rx="3" fill="#334155"/>

  <!-- KPI Cards row -->
  <rect x="20" y="58"  width="175" height="70" rx="8" fill="#1e293b"/>
  <rect x="207" y="58" width="175" height="70" rx="8" fill="#1e293b"/>
  <rect x="394" y="58" width="175" height="70" rx="8" fill="#1e293b"/>
  <rect x="581" y="58" width="199" height="70" rx="8" fill="#1e293b"/>
  <!-- KPI labels -->
  <rect x="32"  y="68" width="80" height="7" rx="2" fill="#64748b"/>
  <rect x="219" y="68" width="90" height="7" rx="2" fill="#64748b"/>
  <rect x="406" y="68" width="75" height="7" rx="2" fill="#64748b"/>
  <rect x="593" y="68" width="85" height="7" rx="2" fill="#64748b"/>
