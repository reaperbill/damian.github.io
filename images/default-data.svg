  <rect x="114" y="215" width="34" height="80" rx="3" fill="#3b82f6"/>
  <rect x="160" y="238" width="34" height="57" rx="3" fill="#3b82f6"/>
  <rect x="206" y="203" width="34" height="92" rx="3" fill="#60a5fa"/>
  <rect x="252" y="222" width="34" height="73" rx="3" fill="#3b82f6"/>
  <rect x="298" y="210" width="34" height="85" rx="3" fill="#60a5fa"/>
  <rect x="344" y="195" width="34" height="100" rx="3" fill="#93c5fd"/>
