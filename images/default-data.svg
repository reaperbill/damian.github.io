  <rect x="68"  y="300" width="34" height="6" rx="2" fill="#475569"/>
  <rect x="114" y="300" width="34" height="6" rx="2" fill="#475569"/>
  <rect x="160" y="300" width="34" height="6" rx="2" fill="#475569"/>
  <rect x="206" y="300" width="34" height="6" rx="2" fill="#475569"/>
  <rect x="252" y="300" width="34" height="6" rx="2" fill="#475569"/>
  <rect x="298" y="300" width="34" height="6" rx="2" fill="#475569"/>
  <rect x="344" y="300" width="34" height="6" rx="2" fill="#475569"/>

