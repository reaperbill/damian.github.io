<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Window background -->
  <rect width="800" height="400" fill="#1e1e2e"/>
  <!-- Title bar -->
  <rect width="800" height="36" fill="#181825"/>
  <!-- Traffic lights -->
  <circle cx="24" cy="18" r="7" fill="#f38ba8"/>
  <circle cx="46" cy="18" r="7" fill="#f9e2af"/>
  <circle cx="68" cy="18" r="7" fill="#a6e3a1"/>
  <!-- File tabs -->
  <rect x="90" y="8" width="120" height="22" rx="3" fill="#1e1e2e"/>
  <rect x="218" y="8" width="100" height="22" rx="3" fill="#11111b"/>
  <rect x="324" y="8" width="100" height="22" rx="3" fill="#11111b"/>
  <rect x="90" y="30" width="120" height="2" fill="#cba6f7"/>
