  <rect x="13" y="92" width="24" height="24" rx="4" fill="#313244"/>
  <rect x="13" y="129" width="24" height="24" rx="4" fill="#313244"/>
  <rect x="13" y="166" width="24" height="24" rx="4" fill="#313244"/>

  <!-- File explorer -->
  <rect x="50" y="36" width="170" height="364" fill="#181825"/>
  <rect x="58" y="50" width="90" height="8" rx="2" fill="#6c7086"/>
