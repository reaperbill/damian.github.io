  <rect x="100" y="16" width="70" height="8" rx="2" fill="#89b4fa"/>
  <rect x="228" y="16" width="60" height="8" rx="2" fill="#45475a"/>
  <rect x="334" y="16" width="60" height="8" rx="2" fill="#45475a"/>

  <!-- Sidebar -->
  <rect x="0" y="36" width="50" height="364" fill="#181825"/>
