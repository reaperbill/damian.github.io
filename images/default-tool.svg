  <rect x="451" y="134" width="8"  height="8" rx="2" fill="#a6adc8"/>

  <!-- Line 5: comment -->
  <rect x="288" y="152" width="220" height="8" rx="2" fill="#6c7086"/>

  <!-- Line 6 -->
  <rect x="288" y="170" width="45" height="8" rx="2" fill="#a6adc8"/>
  <rect x="340" y="170" width="12" height="8" rx="2" fill="#89dceb"/>
  <rect x="359" y="170" width="30" height="8" rx="2" fill="#a6adc8"/>
  <rect x="396" y="170" width="55" height="8" rx="2" fill="#a6e3a1"/>
  <rect x="458" y="170" width="15" height="8" rx="2" fill="#a6adc8"/>

  <!-- Line 7 -->
  <rect x="288" y="188" width="10" height="8" rx="2" fill="#a6adc8"/>
  <rect x="305" y="188" width="28" height="8" rx="2" fill="#89b4fa"/>
  <rect x="340" y="188" width="10" height="8" rx="2" fill="#a6adc8"/>
  <rect x="357" y="188" width="50" height="8" rx="2" fill="#a6e3a1"/>
  <rect x="414" y="188" width="10" height="8" rx="2" fill="#89dceb"/>
  <rect x="431" y="188" width="35" height="8" rx="2" fill="#a6e3a1"/>
  <rect x="473" y="188" width="10" height="8" rx="2" fill="#a6adc8"/>

  <!-- Line 8: return -->
  <rect x="288" y="206" width="38" height="8" rx="2" fill="#cba6f7"/>
  <rect x="333" y="206" width="50" height="8" rx="2" fill="#a6adc8"/>

  <!-- Line 9 -->
  <rect x="272" y="224" width="25" height="8" rx="2" fill="#cba6f7"/>
  <rect x="304" y="224" width="75" height="8" rx="2" fill="#89b4fa"/>
  <rect x="386" y="224" width="8"  height="8" rx="2" fill="#a6adc8"/>
  <rect x="401" y="224" width="20" height="8" rx="2" fill="#fab387"/>
  <rect x="428" y="224" width="8"  height="8" rx="2" fill="#a6adc8"/>

  <!-- Line 10 -->
  <rect x="288" y="242" width="180" height="8" rx="2" fill="#6c7086"/>

  <!-- Terminal pane -->
  <rect x="220" y="300" width="580" height="100" fill="#11111b"/>
  <rect x="220" y="300" width="580" height="26" fill="#181825"/>
  <!-- Terminal tabs -->
  <rect x="228" y="308" width="70" height="10" rx="2" fill="#cba6f7"/>
  <rect x="305" y="308" width="60" height="10" rx="2" fill="#45475a"/>
  <!-- Terminal content -->
  <rect x="228" y="336" width="14" height="9" rx="2" fill="#a6e3a1"/>
  <rect x="248" y="336" width="110" height="9" rx="2" fill="#a6adc8"/>
  <rect x="228" y="354" width="200" height="9" rx="2" fill="#a6adc8"/>
  <rect x="228" y="372" width="14" height="9" rx="2" fill="#a6e3a1"/>
  <rect x="248" y="372" width="150" height="9" rx="2" fill="#a6adc8"/>
  <rect x="228" y="390" width="14" height="9" rx="2" fill="#89b4fa"/>
  <rect x="248" y="390" width="8"  height="9" fill="#89b4fa" opacity="0.85"/>
