  <rect x="70" y="96" width="16" height="16" rx="2" fill="#89b4fa" opacity="0.7"/>
  <rect x="92" y="100" width="65" height="8" rx="2" fill="#a6adc8"/>
  <rect x="70" y="117" width="16" height="16" rx="2" fill="#89b4fa" opacity="0.7"/>
  <rect x="92" y="121" width="55" height="8" rx="2" fill="#89b4fa"/>
  <rect x="70" y="138" width="16" height="16" rx="2" fill="#89b4fa" opacity="0.7"/>
  <rect x="92" y="142" width="70" height="8" rx="2" fill="#a6adc8"/>
  <rect x="58" y="162" width="16" height="16" rx="2" fill="#f9e2af"/>
  <rect x="80" y="166" width="60" height="8" rx="2" fill="#a6adc8"/>
  <rect x="70" y="183" width="16" height="16" rx="2" fill="#89b4fa" opacity="0.7"/>
  <rect x="92" y="187" width="75" height="8" rx="2" fill="#a6adc8"/>

  <!-- Line numbers strip -->
  <rect x="220" y="36" width="44" height="364" fill="#181825"/>
  <rect x="228" y="82"  width="20" height="7" rx="2" fill="#45475a"/>
  <rect x="228" y="100" width="20" height="7" rx="2" fill="#45475a"/>
  <rect x="228" y="118" width="20" height="7" rx="2" fill="#45475a"/>
  <rect x="228" y="136" width="20" height="7" rx="2" fill="#585b70"/>
  <rect x="228" y="154" width="20" height="7" rx="2" fill="#45475a"/>
  <rect x="228" y="172" width="20" height="7" rx="2" fill="#45475a"/>
  <rect x="228" y="190" width="20" height="7" rx="2" fill="#45475a"/>
  <rect x="228" y="208" width="20" height="7" rx="2" fill="#45475a"/>
  <rect x="228" y="226" width="20" height="7" rx="2" fill="#45475a"/>
  <rect x="228" y="244" width="20" height="7" rx="2" fill="#45475a"/>

  <!-- Code area -->
