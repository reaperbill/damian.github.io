  <!-- Active line highlight -->
  <rect x="264" y="130" width="536" height="18" fill="#313244"/>

  <!-- Code lines as syntax-colored blocks -->
  <!-- Line 1: keyword + text + keyword + text -->
  <rect x="272" y="80"  width="42" height="8" rx="2" fill="#cba6f7"/>
  <rect x="320" y="80"  width="55" height="8" rx="2" fill="#a6adc8"/>
  <rect x="382" y="80"  width="18" height="8" rx="2" fill="#cba6f7"/>
  <rect x="406" y="80"  width="22" height="8" rx="2" fill="#a6adc8"/>

  <!-- Line 2 -->
  <rect x="272" y="98"  width="42" height="8" rx="2" fill="#cba6f7"/>
  <rect x="320" y="98"  width="48" height="8" rx="2" fill="#a6adc8"/>
  <rect x="374" y="98"  width="18" height="8" rx="2" fill="#cba6f7"/>
  <rect x="398" y="98"  width="22" height="8" rx="2" fill="#a6adc8"/>

  <!-- Line 3 (blank) -->

  <!-- Line 4: def (highlighted) -->
  <rect x="272" y="134" width="25" height="8" rx="2" fill="#cba6f7"/>
  <rect x="304" y="134" width="90" height="8" rx="2" fill="#89b4fa"/>
  <rect x="400" y="134" width="8"  height="8" rx="2" fill="#a6adc8"/>
